name: CI
on: [push, pull_request]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy agents/ infra/ graph/ config/ db/ monitoring/ scripts/

      - name: Test
        run: pytest tests/ -v --cov=agents --cov=infra --cov=db --cov=monitoring --cov-report=term-missing
        env:
          DRY_RUN: "true"
          ANKR_API_KEY: "test"
          GEMINI_API_KEY: "test"
          KEYSTORE_PASSPHRASE: "test"
